{% extends "base.html" %}
{% block title %}新增出入库记录{% endblock %}
{% block content %}

<h2 style="color:#b8973e;margin-bottom:20px;">📋 新增出入库记录</h2>

<form method="POST" style="max-width:600px;background:#f5f0e8;border:1px solid #e0e0e0;border-radius:8px;padding:30px;">

    <fieldset style="border:1px solid #333;border-radius:6px;padding:15px;margin-bottom:20px;">
        <legend style="color:#b8973e;padding:0 8px;">操作信息</legend>

        <div style="margin-bottom:12px;">
            <label style="color:#555;">操作类型 <span style="color:#c44;">*</span></label>
            <select name="type" required style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;">
                <option value="in" {% if prefilled.action == 'in' %}selected{% endif %}>入库 — 物料进入库存</option>
                <option value="out" {% if prefilled.action == 'out' %}selected{% endif %}>出库 — 物料离开库存</option>
                <option value="transfer" {% if prefilled.action == 'transfer' %}selected{% endif %}>调拨 — 位置转移</option>
                <option value="lock" {% if prefilled.action == 'lock' %}selected{% endif %}>锁定 — 为订单预留</option>
                <option value="unlock" {% if prefilled.action == 'unlock' %}selected{% endif %}>解锁 — 释放预留</option>
                <option value="return" {% if prefilled.action == 'return' %}selected{% endif %}>退货</option>
            </select>
        </div>

        <div style="display:flex;gap:15px;margin-bottom:12px;">
            <div style="flex:1;">
                <label style="color:#555;">物料类别</label>
                <select name="target_type" style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;">
                    <option value="raw" {% if prefilled.target_type == 'raw' %}selected{% endif %}>原材料</option>
                    <option value="semi" {% if prefilled.target_type == 'semi' %}selected{% endif %}>半成品</option>
                    <option value="finished" {% if prefilled.target_type == 'finished' %}selected{% endif %}>成品</option>
                </select>
            </div>
            <div style="flex:1;">
                <label style="color:#555;">物料ID</label>
                <input type="number" name="target_id" value="{{ prefilled.target_id }}" required
                       style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;"
                       placeholder="在物料详情页URL中查看">
            </div>
        </div>
    </fieldset>

    <fieldset style="border:1px solid #333;border-radius:6px;padding:15px;margin-bottom:20px;">
        <legend style="color:#b8973e;padding:0 8px;">详情</legend>

        <div style="display:flex;gap:15px;margin-bottom:12px;">
            <div style="flex:1;">
                <label style="color:#555;">重量</label>
                <input type="number" name="weight" step="0.001"
                       style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;"
                       placeholder="留空则使用物料当前重量">
            </div>
            <div style="flex:1;">
                <label style="color:#555;">关联订单号</label>
                <input type="text" name="related_order_id" id="orderSearch" autocomplete="off"
                       style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;"
                       placeholder="输入订单号或客户名搜索...">
                <div id="orderSuggestions" style="display:none;background:#222;border:1px solid #333;border-radius:4px;max-height:200px;overflow-y:auto;margin-top:2px;position:absolute;z-index:100;width:100%;"></div>
            </div>
        </div>

        <div style="display:flex;gap:15px;margin-bottom:12px;">
            <div style="flex:1;">
                <label style="color:#555;">目标位置（入库/调拨时填写）</label>
                <input type="text" name="to_location"
                       style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;"
                       placeholder="如 保险柜3号 / 展柜A区">
            </div>
        </div>

        <div style="margin-bottom:12px;">
            <label style="color:#555;">备注 / 原因</label>
            <textarea name="reason" rows="2"
                      style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;"></textarea>
        </div>

        {% if current_user.is_admin %}
        <div>
            <label style="color:#555;">操作时成本 (¥)</label>
            <input type="number" name="cost_recorded" step="0.01"
                   style="width:100%;padding:10px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-radius:4px;margin-top:4px;">
        </div>
        {% endif %}
    </fieldset>

    <div style="display:flex;gap:10px;">
        <button type="submit" style="padding:10px 30px;background:#b8973e;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;">保存记录</button>
        <a href="{{ url_for('main.transaction_list') }}" style="padding:10px 20px;background:#333;color:#555;border-radius:6px;text-decoration:none;">取消</a>
    </div>
</form>

<script>
// 订单号搜索自动补全
var orderInput = document.getElementById('orderSearch');
var suggestBox = document.getElementById('orderSuggestions');
var timer = null;

orderInput.addEventListener('input', function() {
    clearTimeout(timer);
    var q = this.value.trim();
    if (q.length < 1) {
        suggestBox.style.display = 'none';
        return;
    }
    timer = setTimeout(function() {
        fetch('/orders/search-api?q=' + encodeURIComponent(q))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.results || data.results.length === 0) {
                    suggestBox.innerHTML = '<div style="padding:8px;color:#888;">无匹配订单</div>';
                } else {
                    var html = '';
                    data.results.forEach(function(o) {
                        var label = (o.order_no || o.id) + ' ' + (o.title || '') + ' (' + (o.customer || '') + ')';
                        html += '<div class="order-option" data-no="' + (o.order_no || o.id) + '" style="padding:8px 10px;cursor:pointer;border-bottom:2px solid #e0e0e0;color:#555;">' +
                                '<span style="color:#b8973e;">' + (o.order_no || '#' + o.id) + '</span> ' +
                                (o.title || '') + ' <span style="color:#888;">' + (o.customer || '') + '</span> ' +
                                '<span style="font-size:0.75rem;color:#888;">[' + o.status + ']</span></div>';
                    });
                    suggestBox.innerHTML = html;
                }
                suggestBox.style.display = 'block';
                // 绑定点击事件
                suggestBox.querySelectorAll('.order-option').forEach(function(el) {
                    el.addEventListener('click', function() {
                        orderInput.value = this.getAttribute('data-no');
                        suggestBox.style.display = 'none';
                    });
                    el.addEventListener('mouseenter', function() { this.style.background = '#333'; });
                    el.addEventListener('mouseleave', function() { this.style.background = ''; });
                });
            });
    }, 300);
});

// 点击其他地方关闭
document.addEventListener('click', function(e) {
    if (e.target !== orderInput && e.target !== suggestBox) {
        suggestBox.style.display = 'none';
    }
});
</script>

{% endblock %}
